server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/eduplatform
    username: developer
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-32chars}
      access-expiration: 900000
      refresh-expiration: 604800000
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:19006
  websocket:
    allowed-origins: "*"
  uploads:
    dir: ${user.home}/Teachers-app-uploads/avatars

logging:
  level:
    com.edu.platform: INFO
    org.springframework.security: WARN
